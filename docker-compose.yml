version: "3.9"

services:
  # ── MariaDB ──────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-youtube_analytics}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dashboard (Streamlit) ────────────────────────────────────────
  dashboard:
    build: .
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
    # Default CMD del Dockerfile: streamlit run dashboard.py

  # ── Scheduler (pipeline diario) ──────────────────────────────────
  scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
    command: ["python", "scheduler.py"]

volumes:
  mariadb_data:
